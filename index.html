<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PlanetForge AI">
  <title>PlanetForge AI</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="three-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;pointer-events:none;"></canvas>
  <canvas id="game-canvas" tabindex="0" style="position:absolute;top:0;left:0;"></canvas>
  <div id="ui-overlay">
    <div id="title-screen">
      <h1>PlanetForge AI</h1>
      <p class="subtitle">Create planets. Farm. Build. Defend. Conquer.</p>
      <button id="btn-start" class="btn-primary">Start Forging</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
